services:
  # Tiny init that renders prometheus.yml.tpl using the EPHEMERD_TARGET env
  # var (default: host.docker.internal:9090, which works on Docker Desktop).
  # Podman / rootless / Linux users override via a .env file or shell.
  prom-config:
    image: busybox:latest
    container_name: ephemerd-prom-config
    restart: "no"
    environment:
      EPHEMERD_TARGET: "${EPHEMERD_TARGET:-host.docker.internal:9090}"
    volumes:
      - ./prometheus.yml.tpl:/tpl/prometheus.yml.tpl:ro
      - prom-config:/out
    command:
      - sh
      - -c
      - |
        sed "s|__EPHEMERD_TARGET__|$$EPHEMERD_TARGET|g" /tpl/prometheus.yml.tpl > /out/prometheus.yml
        echo "prometheus.yml rendered with target=$$EPHEMERD_TARGET"
        cat /out/prometheus.yml

  prometheus:
    image: prom/prometheus:latest
    container_name: ephemerd-prometheus
    restart: unless-stopped
    depends_on:
      prom-config:
        condition: service_completed_successfully
    ports:
      - "9091:9090"
    volumes:
      - prom-config:/etc/prometheus:ro
      - prom-data:/prometheus
    extra_hosts:
      # Lets Linux Docker engines reach the host. On Docker Desktop this is
      # already mapped automatically; on Podman the kernel-defined gateway
      # is the bridge gateway (not the host), so the host.docker.internal
      # default only works on Docker Desktop. See README for alternatives.
      - "host.docker.internal:host-gateway"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=14d'

  grafana:
    image: grafana/grafana-oss:latest
    container_name: ephemerd-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_DEFAULT_THEME=dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prom-config:
  prom-data:
  grafana-data:
