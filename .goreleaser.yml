version: 2

before:
  hooks:
    # Download assets for ALL platforms (Linux runner/CNI/shim come from download:all).
    - cmd: mage download:all
    # Windows cross-compile needs the real Linux binary, Alpine rootfs, and Windows runner.
    - cmd: mage download:runnerwindows
    - cmd: mage download:rootfs
    - cmd: mage build:linuxembed

builds:
  - id: ephemerd
    main: ./cmd/ephemerd/
    binary: ephemerd
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X github.com/ephpm/ephemerd/pkg/runner.Version=2.333.1
      - -X github.com/ephpm/ephemerd/pkg/cni.Version=1.6.2
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: ephpm
    name: ephemerd
  draft: true
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
