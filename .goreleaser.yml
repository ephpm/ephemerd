version: 2

before:
  hooks:
    - cmd: bash -c 'RUNNER_VERSION={{.Env.RUNNER_VERSION}} GOOS={{.Os}} GOARCH={{.Arch}} make download-runner'
      env:
        - RUNNER_VERSION={{ if index .Env "RUNNER_VERSION" }}{{ .Env.RUNNER_VERSION }}{{ else }}2.333.1{{ end }}

builds:
  - id: ephemerd
    main: ./cmd/ephemerd/
    binary: ephemerd
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X github.com/ephpm/ephemerd/pkg/runner.Version={{ if index .Env "RUNNER_VERSION" }}{{ .Env.RUNNER_VERSION }}{{ else }}2.333.1{{ end }}
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: ephpm
    name: ephemerd
  draft: true
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
