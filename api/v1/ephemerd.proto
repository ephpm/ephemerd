syntax = "proto3";

package ephemerd.v1;

option go_package = "github.com/ephpm/ephemerd/api/v1;apiv1";

service Control {
  rpc Status(StatusRequest) returns (StatusResponse);
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  rpc GetJob(GetJobRequest) returns (Job);
  rpc KillJob(KillJobRequest) returns (KillJobResponse);
  rpc GetJobLogs(GetJobLogsRequest) returns (stream LogChunk);
}

message StatusRequest {}

message StatusResponse {
  string status = 1;
  int32 active_jobs = 2;
  int32 max_concurrent = 3;
  bool draining = 4;
  string uptime = 5;
}

message ListJobsRequest {}

message ListJobsResponse {
  repeated Job jobs = 1;
}

message GetJobRequest {
  int64 id = 1;
}

message Job {
  int64 id = 1;
  string name = 2;
  string repo = 3;
  string image = 4;
  int64 runner_id = 5;
  string status = 6;
  uint32 pid = 7;
  string started_at = 8; // RFC3339
  string uptime = 9;
}

message KillJobRequest {
  int64 id = 1;
}

message KillJobResponse {}

message GetJobLogsRequest {
  int64 id = 1;
  bool follow = 2;
}

message LogChunk {
  bytes data = 1;
}

// Dispatch is a lightweight job dispatch service used by the in-VM
// containerd-only worker (Hyper-V Linux VM on Windows, Vz Linux VM on macOS).
// The host scheduler sends Linux jobs here via gRPC; the worker creates
// containers using its local (Linux) Runtime. The host also subscribes to
// StreamContainerStats to surface per-container resource usage on its own
// /metrics endpoint without exposing a second listener inside the VM.
service Dispatch {
  rpc CreateJob(CreateJobRequest) returns (CreateJobResponse);
  rpc WaitJob(WaitJobRequest) returns (WaitJobResponse);
  rpc DestroyJob(DestroyJobRequest) returns (DestroyJobResponse);
  rpc StreamContainerStats(StreamContainerStatsRequest) returns (stream ContainerStatsBatch);
}

message CreateJobRequest {
  string id = 1;
  string image = 2;
  string jit_config = 3;
  // provider is the forge name (e.g. "github", "gitea"); together with
  // repo it scopes dind's per-repo image cache.
  string provider = 4;
  // repo is the forge-native repo path (e.g. "owner/repo").
  string repo = 5;
}
message CreateJobResponse {}

message WaitJobRequest { string id = 1; }
message WaitJobResponse { uint32 exit_code = 1; }

message DestroyJobRequest { string id = 1; }
message DestroyJobResponse {}

// StreamContainerStatsRequest opens a long-lived sampling stream. The host
// dictates the cadence; the in-VM worker ticks at this interval and sends one
// ContainerStatsBatch per tick.
message StreamContainerStatsRequest {
  uint32 interval_seconds = 1; // 0 -> server default (10s)
}

message ContainerStatsBatch {
  int64 timestamp_unix_nano = 1; // server-side wall clock at sample time
  repeated ContainerStats stats = 2;
}

message ContainerStats {
  string id = 1;
  string repo = 2;
  uint64 cpu_usage_nanos = 3;       // cumulative CPU time in nanoseconds
  uint64 memory_bytes = 4;          // current usage
  uint64 memory_anon_bytes = 5;     // anon-only (cgroup); 0 on Windows
  uint64 cpu_limit = 6;             // configured vCPU count; 0 = unlimited
  uint64 memory_limit_bytes = 7;    // configured memory cap; 0 = unlimited
  // Cumulative network bytes (the runner container only — does not include
  // sibling containers spawned via dind). On Linux this is read via
  // netlink against the container's netns and excludes loopback. On
  // Windows it sums BytesReceived/BytesSent across HCS endpoints.
  uint64 network_rx_bytes = 8;
  uint64 network_tx_bytes = 9;
}
