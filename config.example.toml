[github]
# Authentication: personal access token with repo + admin:org scope
token = "ghp_your_token_here"

# Organization or user that owns the repos
owner = "your-org"

# Repos to register runners for (optional).
# If omitted, registers org-level runners available to all repos in the org.
# repos = ["repo1", "repo2"]

# Job discovery: polling (default) or webhook
# Polling checks the GitHub API every interval — no inbound ports or certs needed.
# Set tls_cert + tls_key to enable webhook mode instead (instant delivery).
poll_interval = "10s"

# Webhook mode (optional): listen for GitHub webhook events over TLS
# webhook_port = 8080
# webhook_secret = "your_webhook_secret"
# tls_cert = "/etc/ephemerd/tls.crt"
# tls_key = "/etc/ephemerd/tls.key"

[network]
# Container subnet. Ephemerd auto-picks a free subnet if this conflicts with
# an existing network (e.g. Podman, Docker). You don't need to change this.
# subnet = "10.88.0.0/16"

[runner]

# Max concurrent jobs
max_concurrent = 4

# Extra labels applied to all runners (in addition to self-hosted, os, arch)
extra_labels = []

# Max time a job can run before forced teardown
job_timeout = "2h"

# Time to wait for running jobs during graceful shutdown
shutdown_timeout = "5m"

[log]
# Log level: debug, info, warn, error
level = "info"

# Log format: text or json
format = "text"
