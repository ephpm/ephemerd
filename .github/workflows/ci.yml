name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26.1"

jobs:
  ci:
    name: Lint, Test & Build (Linux)
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: CI (download, lint, test, build)
        run: mage ci

  e2e:
    name: E2E Tests
    needs: ci
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: GitHub provider (fake server)
        run: mage e2egithub

      - name: Go module proxy
        run: mage e2emodproxy

      - name: Forgejo provider
        run: mage e2eforgejo

      - name: Gitea provider
        run: mage e2egitea

  build-macos:
    name: Build (macOS arm64)
    runs-on: [self-hosted, macos, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: Build macOS binary
        run: mage build:macos

      - name: Verify binary
        run: |
          ./ephemerd --version
          codesign -v ./ephemerd && echo "codesigned" || echo "not codesigned"

  build-linux-arm64:
    name: Build (Linux arm64)
    runs-on: [self-hosted, linux, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: Build Linux arm64 binary
        run: mage build:build

      - name: Verify binary
        run: ./ephemerd --version

  build-windows:
    name: Build (Windows amd64)
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: Build Windows binary
        run: mage build:windows

      - name: Verify binary
        run: ls -lh ./ephemerd.exe
