name: CI

on:
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26.1"

jobs:
  ci:
    name: Lint, Unit, E2E & Build (Linux)
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v6

      # Go and mage come from the runner-ci-linux image (see images/runner-ci-linux/Dockerfile),
      # so setup-go and `go install mage` are unnecessary here.
      # - uses: actions/setup-go@v6
      #   with:
      #     go-version: ${{ env.GO_VERSION }}
      # - name: Install mage
      #   run: go install github.com/magefile/mage@latest

      - name: Restore cached build deps
        run: /opt/ephemerd-ci/entrypoint-cache.sh
        continue-on-error: true

      - name: Lint, test & build
        run: mage ci

      - name: E2E — GitHub provider (fake server)
        run: mage e2egithub

      - name: E2E — Go module proxy
        run: mage e2emodproxy

  build-macos:
    name: Build (macOS arm64)
    needs: ci
    runs-on: [self-hosted, macos, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: Build macOS binary
        run: mage build:macos

      - name: Verify binary
        run: |
          ./ephemerd --version
          codesign -v ./ephemerd && echo "codesigned" || echo "not codesigned"

  build-linux-arm64:
    name: Build (Linux arm64)
    needs: ci
    runs-on: [self-hosted, linux, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: Build Linux arm64 binary
        run: mage build:build

      - name: Verify binary
        run: ./ephemerd --version

  build-windows:
    name: Build (Windows amd64)
    needs: ci
    runs-on: [self-hosted, windows, x64]
    steps:
      - uses: actions/checkout@v6

      # Go and mage come from the runner-ci-windows image (see images/runner-ci-windows/Dockerfile),
      # so setup-go and `go install mage` are unnecessary here.
      # - uses: actions/setup-go@v6
      #   with:
      #     go-version: ${{ env.GO_VERSION }}
      # - name: Install mage
      #   run: go install github.com/magefile/mage@latest

      - name: Build Windows binary
        run: mage build:build

      - name: Verify binary
        run: .\ephemerd.exe --version
