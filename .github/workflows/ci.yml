name: CI

on:
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26.1"

jobs:
  ci:
    name: Lint, Unit, E2E & Build (Linux)
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v6

      # Go and mage come from the runner-ci-linux image (see images/runner-ci-linux/Dockerfile),
      # so setup-go and `go install mage` are unnecessary here.
      # - uses: actions/setup-go@v6
      #   with:
      #     go-version: ${{ env.GO_VERSION }}
      # - name: Install mage
      #   run: go install github.com/magefile/mage@latest

      - name: Restore cached build deps
        run: /opt/ephemerd-ci/entrypoint-cache.sh
        continue-on-error: true

      - name: Lint, test & build
        run: mage ci

      - name: E2E — GitHub provider (fake server)
        run: mage e2egithub

      - name: E2E — Go module proxy
        run: mage e2emodproxy

  build-macos:
    name: Build (macOS arm64)
    needs: ci
    runs-on: [self-hosted, macos, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: Build macOS binary
        run: mage build:macos

      - name: Verify binary
        run: |
          ./ephemerd --version
          codesign -v ./ephemerd && echo "codesigned" || echo "not codesigned"

  build-linux-arm64:
    name: Build (Linux arm64)
    needs: ci
    runs-on: [self-hosted, linux, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: Build Linux arm64 binary
        run: mage build:build

      - name: Verify binary
        run: ./ephemerd --version

  build-windows:
    name: Build (Windows amd64)
    needs: ci
    runs-on: [self-hosted, windows, x64]
    steps:
      - uses: actions/checkout@v6

      - name: Restore cached build deps
        run: |
          C:\ephemerd-ci\entrypoint-cache.ps1
          Write-Host "=== DEBUG PATH ==="
          Write-Host "env:PATH = $env:PATH"
          Write-Host "=== C:\go ==="
          if (Test-Path "C:\go") { Get-ChildItem "C:\go" } else { Write-Host "C:\go does not exist" }
          Write-Host "=== C:\go\bin ==="
          if (Test-Path "C:\go\bin") { Get-ChildItem "C:\go\bin" | Select-Object Name } else { Write-Host "C:\go\bin does not exist" }
          Write-Host "=== ContainerUser ==="
          if (Test-Path "C:\Users\ContainerUser\go\bin") { Get-ChildItem "C:\Users\ContainerUser\go\bin" | Select-Object Name } else { Write-Host "C:\Users\ContainerUser\go\bin does not exist" }
          Write-Host "=== where.exe mage ==="
          where.exe mage 2>&1
          Write-Host "=== where.exe go ==="
          where.exe go 2>&1
          foreach ($d in @("C:\go\bin", "C:\Users\ContainerUser\go\bin")) { if (Test-Path $d) { Add-Content -Path $env:GITHUB_PATH -Value $d } }
        continue-on-error: true

      - name: Build Windows binary
        run: mage build:build

      - name: Verify binary
        run: .\ephemerd.exe --version
