name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26.1"

jobs:
  ci:
    name: Lint, Test & Build (Linux)
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: CI (download, lint, test, build)
        run: mage ci

  build-macos:
    name: Build (macOS arm64)
    runs-on: [self-hosted, macos, arm64]
    steps:
      - name: Install Xcode CLI tools
        run: |
          if ! xcode-select -p &>/dev/null; then
            # Headless install — create the trigger file and use softwareupdate
            sudo touch /tmp/.com.apple.dt.CommandLineTools.installondemand.in-progress
            PROD=$(softwareupdate -l 2>/dev/null | grep -o '.*Command Line Tools.*' | head -1 | sed 's/^[* ]*//')
            sudo softwareupdate -i "$PROD" --verbose 2>&1 | tail -5
            sudo rm -f /tmp/.com.apple.dt.CommandLineTools.installondemand.in-progress
          fi
          xcode-select -p

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: Build macOS binary
        run: mage build:macos

      - name: Verify binary
        run: |
          ./ephemerd --version
          codesign -v ./ephemerd && echo "codesigned" || echo "not codesigned"

  build-linux-arm64:
    name: Build (Linux arm64)
    runs-on: [self-hosted, linux, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: Build Linux arm64 binary
        run: mage build:build

      - name: Verify binary
        run: ./ephemerd --version

  build-windows:
    name: Build (Windows amd64)
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: Build Windows binary
        run: mage build:windows

      - name: Verify binary
        run: ls -lh ./ephemerd.exe
