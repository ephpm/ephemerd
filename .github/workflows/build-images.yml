# Build and push CI runner images to Docker Hub.
#
# Trigger manually or on changes to Dockerfiles / version bumps.
# Each image gets a latest tag and a date-stamped tag:
#   ephpm/ephemerd:runner-ci-linux
#   ephpm/ephemerd:runner-ci-linux-20260418
#
# Linux builds run natively on both amd64 and arm64 self-hosted runners,
# then merge into a multi-arch manifest. No QEMU emulation needed.

name: Build CI Runner Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "images/**"
      - "mage/download/download.go"

env:
  IMAGE_REPO: ephpm/ephemerd

jobs:
  linux:
    name: Build Linux CI Runner (${{ matrix.arch }})
    runs-on: [self-hosted, linux, "${{ matrix.runner }}"]
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: x64
          - arch: arm64
            runner: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set date tag
        run: echo "DATE_TAG=$(date +%Y%m%d)" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: images/runner-ci-linux
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:runner-ci-linux-${{ matrix.arch }}
            ${{ env.IMAGE_REPO }}:runner-ci-linux-${{ matrix.arch }}-${{ env.DATE_TAG }}

  linux-manifest:
    name: Create Linux multi-arch manifest
    needs: linux
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Set date tag
        run: echo "DATE_TAG=$(date +%Y%m%d)" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create and push manifest
        run: |
          docker manifest create ${{ env.IMAGE_REPO }}:runner-ci-linux \
            ${{ env.IMAGE_REPO }}:runner-ci-linux-amd64 \
            ${{ env.IMAGE_REPO }}:runner-ci-linux-arm64
          docker manifest push ${{ env.IMAGE_REPO }}:runner-ci-linux

          docker manifest create ${{ env.IMAGE_REPO }}:runner-ci-linux-${{ env.DATE_TAG }} \
            ${{ env.IMAGE_REPO }}:runner-ci-linux-amd64-${{ env.DATE_TAG }} \
            ${{ env.IMAGE_REPO }}:runner-ci-linux-arm64-${{ env.DATE_TAG }}
          docker manifest push ${{ env.IMAGE_REPO }}:runner-ci-linux-${{ env.DATE_TAG }}

  macos-deps:
    name: Build macOS Deps
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Set date tag
        run: echo "DATE_TAG=$(date +%Y%m%d)" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: images/runner-ci-macos
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:runner-ci-macos-deps
            ${{ env.IMAGE_REPO }}:runner-ci-macos-deps-${{ env.DATE_TAG }}

  windows:
    name: Build Windows CI Runner
    runs-on: [self-hosted, windows, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Set date tag
        # servercore ships Windows PowerShell 5.1 (powershell.exe) but not
        # PowerShell Core (pwsh.exe); Get-Date + $env:GITHUB_ENV work in both.
        shell: powershell
        run: echo "DATE_TAG=$(Get-Date -Format 'yyyyMMdd')" >> $env:GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        run: |
          docker build -t ${{ env.IMAGE_REPO }}:runner-ci-windows -t ${{ env.IMAGE_REPO }}:runner-ci-windows-${{ env.DATE_TAG }} images/runner-ci-windows
          docker push ${{ env.IMAGE_REPO }}:runner-ci-windows
          docker push ${{ env.IMAGE_REPO }}:runner-ci-windows-${{ env.DATE_TAG }}
