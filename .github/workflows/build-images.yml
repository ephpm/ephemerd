# Build and push CI runner images to Docker Hub.
#
# Trigger manually or on changes to Dockerfiles / version bumps.
# Each image gets a latest tag and a date-stamped tag:
#   ephpm/ephemerd:runner-ci-linux
#   ephpm/ephemerd:runner-ci-linux-20260418
#
# Linux builds run natively on both amd64 and arm64 self-hosted runners,
# then merge into a multi-arch manifest. No QEMU emulation needed.

name: Build CI Runner Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "images/**"
      - "mage/download/download.go"

env:
  IMAGE_REPO: ephpm/ephemerd

jobs:
  linux:
    name: Build Linux CI Runner (${{ matrix.arch }})
    runs-on: [self-hosted, linux, "${{ matrix.runner }}"]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: x64
          - arch: arm64
            runner: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set date tag
        run: echo "DATE_TAG=$(date +%Y%m%d)" >> "$GITHUB_ENV"

      # Plain `docker build` against the ephemerd fake-daemon — no buildx,
      # no privileged buildkit-in-container. Goes straight to /build, which
      # dispatches into the embedded BuildKit solver (pkg/buildkit,
      # docs/arch/docker-builds.md). /auth and /images/{ref}/push are
      # handled by pkg/dind/registry.go.
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        env:
          # Modern Docker CLI silently aliases `docker build` to `docker buildx build`,
          # which spawns moby/buildkit:buildx-stable-1 in a container — that needs
          # --privileged and we don't allow that. DOCKER_BUILDKIT=0 reverts to the
          # legacy CLI path which POSTs straight to /build, where ephemerd's fake
          # daemon dispatches into the embedded BuildKit solver (pkg/buildkit).
          DOCKER_BUILDKIT: "0"
        run: |
          TAG_LATEST="${{ env.IMAGE_REPO }}:runner-ci-linux-${{ matrix.arch }}"
          TAG_DATED="${{ env.IMAGE_REPO }}:runner-ci-linux-${{ matrix.arch }}-${{ env.DATE_TAG }}"
          docker build -t "$TAG_LATEST" -t "$TAG_DATED" images/runner-ci-linux
          docker push "$TAG_LATEST"
          docker push "$TAG_DATED"

  linux-manifest:
    name: Create Linux multi-arch manifest
    needs: linux
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Set date tag
        run: echo "DATE_TAG=$(date +%Y%m%d)" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create and push manifest
        run: |
          docker manifest create ${{ env.IMAGE_REPO }}:runner-ci-linux \
            ${{ env.IMAGE_REPO }}:runner-ci-linux-amd64 \
            ${{ env.IMAGE_REPO }}:runner-ci-linux-arm64
          docker manifest push ${{ env.IMAGE_REPO }}:runner-ci-linux

          docker manifest create ${{ env.IMAGE_REPO }}:runner-ci-linux-${{ env.DATE_TAG }} \
            ${{ env.IMAGE_REPO }}:runner-ci-linux-amd64-${{ env.DATE_TAG }} \
            ${{ env.IMAGE_REPO }}:runner-ci-linux-arm64-${{ env.DATE_TAG }}
          docker manifest push ${{ env.IMAGE_REPO }}:runner-ci-linux-${{ env.DATE_TAG }}

  macos-deps:
    # Runs on a Linux runner. Independent of the linux matrix — we can
    # dispatch multiple Linux jobs to the VM in parallel.
    name: Build macOS Deps
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Set date tag
        run: echo "DATE_TAG=$(date +%Y%m%d)" >> "$GITHUB_ENV"

      # Plain `docker build` (no buildx) — routes through ephemerd's /build
      # endpoint and the embedded BuildKit solver. Avoids the
      # buildkit-in-a-container path that needs --privileged.
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        env:
          DOCKER_BUILDKIT: "0"
        run: |
          TAG_LATEST="${{ env.IMAGE_REPO }}:runner-ci-macos-deps"
          TAG_DATED="${{ env.IMAGE_REPO }}:runner-ci-macos-deps-${{ env.DATE_TAG }}"
          docker build -t "$TAG_LATEST" -t "$TAG_DATED" images/runner-ci-macos
          docker push "$TAG_LATEST"
          docker push "$TAG_DATED"

  windows:
    name: Build Windows CI Runner
    runs-on: [self-hosted, windows, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Set date tag
        # servercore ships Windows PowerShell 5.1 (powershell.exe) but not
        # PowerShell Core (pwsh.exe); Get-Date + $env:GITHUB_ENV work in both.
        shell: powershell
        run: echo "DATE_TAG=$(Get-Date -Format 'yyyyMMdd')" >> $env:GITHUB_ENV

      # Plain `docker build` against the legacy daemon builder — no
      # DOCKER_BUILDKIT, no buildx. Buildx's docker-container driver tries
      # to pull a Windows buildkit image that moby retired, and forcing
      # the `docker` driver fights buildx's auto-default management. Since
      # the Dockerfile now puts `# escape=`` ` as the very first line
      # (parser directives MUST precede comments), the legacy builder
      # honors the backtick line continuations and Windows path escaping.
      #
      # This routes through ephemerd's fake daemon's /build endpoint
      # (pkg/dind), which dispatches into the embedded BuildKit solver
      # (pkg/buildkit, see docs/arch/docker-builds.md). /auth and
      # /images/{ref}/push are handled by pkg/dind/registry.go.
      - name: Ensure docker CLI is available
        shell: powershell
        run: |
          if (Get-Command docker -ErrorAction SilentlyContinue) {
            Write-Host "docker CLI already on PATH"
            return
          }
          $v = "27.3.1"
          Write-Host "docker CLI not found — downloading v$v..."
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://download.docker.com/win/static/stable/x86_64/docker-$v.zip" -OutFile docker.zip
          Expand-Archive docker.zip -DestinationPath C:\temp-docker
          Copy-Item C:\temp-docker\docker\docker.exe C:\go\bin\docker.exe
          Remove-Item -Recurse docker.zip, C:\temp-docker
          Write-Host "Installed docker CLI to C:\go\bin\docker.exe"

      - name: Login to Docker Hub
        shell: powershell
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: $env:DOCKER_PASSWORD | docker login -u $env:DOCKER_USERNAME --password-stdin

      - name: Build and push
        shell: powershell
        run: |
          $tagLatest = "${{ env.IMAGE_REPO }}:runner-ci-windows"
          $tagDated  = "${{ env.IMAGE_REPO }}:runner-ci-windows-$env:DATE_TAG"
          docker build -t $tagLatest -t $tagDated images/runner-ci-windows
          docker push $tagLatest
          docker push $tagDated
