# Build and push CI runner images to Docker Hub.
#
# Trigger manually or on changes to Dockerfiles / version bumps.
# Each image gets a latest tag and a date-stamped tag:
#   ephpm/ephemerd:runner-ci-linux
#   ephpm/ephemerd:runner-ci-linux-20260418
#
# Linux builds run natively on both amd64 and arm64 self-hosted runners,
# then merge into a multi-arch manifest. No QEMU emulation needed.

name: Build CI Runner Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "images/**"
      - "mage/download/download.go"

env:
  IMAGE_REPO: ephpm/ephemerd

jobs:
  linux:
    name: Build Linux CI Runner (${{ matrix.arch }})
    runs-on: [self-hosted, linux, "${{ matrix.runner }}"]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: x64
          - arch: arm64
            runner: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set date tag
        run: echo "DATE_TAG=$(date +%Y%m%d)" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: images/runner-ci-linux
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:runner-ci-linux-${{ matrix.arch }}
            ${{ env.IMAGE_REPO }}:runner-ci-linux-${{ matrix.arch }}-${{ env.DATE_TAG }}

  linux-manifest:
    name: Create Linux multi-arch manifest
    needs: linux
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Set date tag
        run: echo "DATE_TAG=$(date +%Y%m%d)" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create and push manifest
        run: |
          docker manifest create ${{ env.IMAGE_REPO }}:runner-ci-linux \
            ${{ env.IMAGE_REPO }}:runner-ci-linux-amd64 \
            ${{ env.IMAGE_REPO }}:runner-ci-linux-arm64
          docker manifest push ${{ env.IMAGE_REPO }}:runner-ci-linux

          docker manifest create ${{ env.IMAGE_REPO }}:runner-ci-linux-${{ env.DATE_TAG }} \
            ${{ env.IMAGE_REPO }}:runner-ci-linux-amd64-${{ env.DATE_TAG }} \
            ${{ env.IMAGE_REPO }}:runner-ci-linux-arm64-${{ env.DATE_TAG }}
          docker manifest push ${{ env.IMAGE_REPO }}:runner-ci-linux-${{ env.DATE_TAG }}

  macos-deps:
    # Runs on a Linux runner (buildx cross-build). Serialized after the linux
    # matrix because our ephemerd Linux VM can only safely host one CI job at
    # a time — two concurrent Linux runners on the same VM kill each other
    # before buildx finishes booting.
    needs: linux-manifest
    name: Build macOS Deps
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Set date tag
        run: echo "DATE_TAG=$(date +%Y%m%d)" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: images/runner-ci-macos
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:runner-ci-macos-deps
            ${{ env.IMAGE_REPO }}:runner-ci-macos-deps-${{ env.DATE_TAG }}

  windows:
    name: Build Windows CI Runner
    runs-on: [self-hosted, windows, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Set date tag
        # servercore ships Windows PowerShell 5.1 (powershell.exe) but not
        # PowerShell Core (pwsh.exe); Get-Date + $env:GITHUB_ENV work in both.
        shell: powershell
        run: echo "DATE_TAG=$(Get-Date -Format 'yyyyMMdd')" >> $env:GITHUB_ENV

      # Plain `docker build` + `docker push` — bypasses buildx (its --bootstrap
      # path pulls moby/buildkit:* which has no Windows variant). The fake
      # daemon's /build endpoint routes into the embedded BuildKit solver
      # (pkg/buildkit, see docs/arch/docker-builds.md). /auth + /images/{ref}/push
      # are handled by pkg/dind/registry.go — auth is cached in-memory, push
      # uses containerd's docker resolver to ship the image to Docker Hub.
      # docker CLI with DOCKER_BUILDKIT=1 dispatches `docker build` to the
      # buildx CLI plugin. Download the standalone buildx binary into the
      # user's cli-plugins dir so the plugin is discoverable. We pin to a
      # known-good buildx version to keep CI deterministic.
      - name: Install docker buildx CLI plugin
        shell: powershell
        run: |
          $pluginDir = "$env:USERPROFILE\.docker\cli-plugins"
          New-Item -ItemType Directory -Path $pluginDir -Force | Out-Null
          Invoke-WebRequest `
            -Uri "https://github.com/docker/buildx/releases/download/v0.18.0/buildx-v0.18.0.windows-amd64.exe" `
            -OutFile "$pluginDir\docker-buildx.exe"
          docker buildx version

      # Force buildx to use the `docker` driver (delegates to the local
      # daemon's BuildKit) instead of the default `docker-container` driver.
      # docker-container would try to spawn a buildkit container by pulling
      # moby/buildkit:buildx-stable-1, which has no Windows variant.
      #
      # buildx ships with an implicit "default" builder using docker-container
      # AND only allows one docker-driver instance per context — `create
      # --driver docker` errors with "additional instances of driver 'docker'
      # cannot be created" if we don't drop the default first. So: remove the
      # existing default, then make a fresh docker-driver "dind" the active
      # builder.
      - name: Configure buildx for docker driver
        shell: powershell
        run: |
          docker buildx rm default 2>$null
          docker buildx create --name dind --driver docker --use
          docker buildx ls

      - name: Login to Docker Hub
        shell: powershell
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: $env:DOCKER_PASSWORD | docker login -u $env:DOCKER_USERNAME --password-stdin

      - name: Build and push
        shell: powershell
        env:
          # Force the CLI to send the build to /build with BuildKit semantics.
          # Otherwise the CLI's daemon-feature probe falls back to the legacy
          # builder, which doesn't honor the `# escape=` directive used in
          # this Dockerfile (line 14 is a backtick-continuation that legacy
          # parses as an unknown `Expand-Archive` instruction).
          DOCKER_BUILDKIT: "1"
        run: |
          $tagLatest = "${{ env.IMAGE_REPO }}:runner-ci-windows"
          $tagDated  = "${{ env.IMAGE_REPO }}:runner-ci-windows-$env:DATE_TAG"
          docker build -t $tagLatest -t $tagDated images/runner-ci-windows
          docker push $tagLatest
          docker push $tagDated
