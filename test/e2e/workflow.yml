# This file has moved to .github/workflows/test-runner.yml
# It runs automatically when triggered via workflow_dispatch on GitHub.
#
# To test:
#   1. Build: make build
#   2. Copy test/e2e/config.example.toml to config.toml, add your GitHub PAT
#   3. Start: sudo ./ephemerd serve --config config.toml
#   4. Go to GitHub > Actions > "Test ephemerd runner" > Run workflow
#   5. Watch ephemerd logs for the full lifecycle:
#      - Poll detects queued job
#      - JIT runner registered
#      - Container created from ubuntu:22.04
#      - Runner binary bind-mounted and started
#      - Job executes (system info, network check, checkout)
#      - Container destroyed on completion
